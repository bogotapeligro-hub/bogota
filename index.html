<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esto es Bogotá HP</title>
  <meta name="description" content="Red social urbana para reportes ciudadanos de Bogotá: movilidad, emergencias, manifestaciones y situaciones de interés público." />
  <link rel="icon" href="assets/logo.png" type="image/png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/feed.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="stylesheet" href="css/casino.css" />
  <link rel="stylesheet" href="css/ruletaBogotana.css" />
  <link rel="stylesheet" href="css/profile.css" />
  <link rel="stylesheet" href="css/shorts.css" />
  <link rel="stylesheet" href="css/notifications.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div id="ageGateRoot"></div>

  <header class="topbar" id="topbar">
    <button class="icon-btn mobile-only" id="menuToggle" aria-label="Abrir menú">☰</button>
    <a class="brand" href="#/feed" aria-label="Bogotá Alerta Urbana">
      <img src="assets/logo.png" alt="Logo Bogotá Alerta Urbana" />
      <span>Bogotá <strong>HPTS</strong></span>
    </a>
    <nav class="top-actions">
      <button class="ghost-btn" id="rulesShortcut">Reglas</button>
      <button class="ghost-btn chat-shortcut" id="chatShortcut">Chat <span class="chat-badge hidden" id="topChatBadge">0</span></button>
      <button class="ghost-btn" id="casinoShortcut">🎰 Jugar</button>
      <button class="notif-bell-btn" id="notifBell" aria-label="Notificaciones">
        🔔<span class="notif-badge hidden" data-notif-badge>0</span>
      </button>
      <span class="role-badge hidden" id="roleBadge"></span>
      <button class="ghost-btn hidden" id="adminShortcut">Panel Admin</button>
      <button class="warning-btn" id="publishShortcut">Publicar</button>
      <button class="ghost-btn session-btn hidden" id="logoutBtn">Cerrar sesion</button>
    </nav>
  </header>

  <div id="toastRoot" class="toast-root" aria-live="polite"></div>
  <main id="app" class="app-shell"></main>

  <a href="#/create-post" class="floating-post-btn" id="floatingPostBtn" aria-label="Crear publicación">+</a>

  <nav class="bottom-nav" id="bottomNav">
    <a href="#/feed" class="bottom-nav-item" data-nav="feed">🏠<span>Inicio</span></a>
    <a href="#/shorts" class="bottom-nav-item" data-nav="shorts">🎬<span>Shorts</span></a>
    <a href="#/chat" class="bottom-nav-item" data-nav="chat">💬<span>Chat</span><span class="bottom-badge hidden" data-chat-badge>0</span></a>
    <a href="#/casino" class="bottom-nav-item" data-nav="casino">🎰<span>Jugar</span></a>
    <a href="#/profile" class="bottom-nav-item" data-nav="profile">👤<span>Perfil</span></a>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/moderation.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ageGate.js"></script>
  <script src="js/reactions.js"></script>
  <script src="js/comments.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/feed.js"></script>
  <script src="js/mapaReportes.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/casinoCoins.js"></script>
  <script src="js/casino.js"></script>
  <script src="js/casinoDuelos.js"></script>
  <script src="js/powersRuleta.js"></script>
  <script src="js/botRuleta.js"></script>
  <script src="js/ruletaBogotana.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/shorts.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/router.js"></script>
</body>
</html>
