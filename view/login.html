<section class="auth-page">
  <div class="auth-card">
    <span class="badge-alert">Acceso urbano</span>
    <h1>Iniciar sesion</h1>
    <p class="muted">Entra con tu nombre de usuario. No uses tu nombre real si no quieres.</p>
    <form id="loginForm" class="auth-form">
      <label for="username">Nombre de usuario</label>
      <input id="username" name="username" type="text" autocomplete="username" placeholder="ej: alerta_suba" required />
      <label for="password">Contrasena</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Tu contrasena" required />
      <button class="warning-btn full" type="submit">Entrar</button>
    </form>
    <p class="auth-switch">No tienes cuenta? <a href="#/register">Registrate sin datos personales</a></p>
  </div>
</section>
