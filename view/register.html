<section class="auth-page">
  <div class="auth-card large">
    <span class="badge-alert">Registro 18+</span>
    <h1>Crear cuenta</h1>
    <p class="muted">No se pide correo, cédula, teléfono ni nombre real. Usa solo un nombre de usuario y contraseña.</p>
    <form id="registerForm" class="auth-form">
      <label for="username">Nombre de usuario</label>
      <input id="username" name="username" type="text" autocomplete="username" placeholder="3 a 20 caracteres" required />
      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" autocomplete="new-password" minlength="6" required />
      <label for="password2">Repetir contraseña</label>
      <input id="password2" name="password2" type="password" autocomplete="new-password" minlength="6" required />
      <label class="check-row">
        <input name="ageConfirmed" type="checkbox" />
        <span>Confirmo que tengo 18 años o más</span>
      </label>
      <label class="check-row">
        <input name="rulesAccepted" type="checkbox" />
        <span>Acepto las reglas de publicación</span>
      </label>
      <button class="warning-btn full" type="submit">Crear cuenta</button>
    </form>
    <p class="auth-switch">¿Ya tienes cuenta? <a href="#/login">Inicia sesión</a></p>
  </div>
</section>
